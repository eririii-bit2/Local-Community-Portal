<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Service Form</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary bg-dark">
    <div class="container">

      <a class="navbar-brand text-light fw-bold fs-2" href="#">
        Community Portal
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="mainNav">
        <ul class="navbar-nav gap-1 fs-5">

          <li class="nav-item"><a class="nav-link text-light" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="rsf.html">Services</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="newspage.html">News</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="announcements.html">Announcements</a></li>

        </ul>
      </div>

    </div>
  </nav>

  <!-- Form -->
  <div class="container col-lg-6 py-5 fw-bold">

    <form id="serviceForm">

      <h2 class="mb-4 text-dark">Resident Service Form</h2>

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" required/>
      </div>

      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" required/>
      </div>

      <div class="mb-3">
        <label class="form-label">Select Service</label>
        <select class="form-select" id="service">
          <option value="">Choose...</option>
          <option>Barangay Certificate</option>
          <option>Residency Certificate</option>
          <option>Report an Issue</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Details</label>
        <textarea class="form-control" id="message" rows="4" required></textarea>
      </div>

      <button type="submit" class="btn btn-dark">
        Submit Request
      </button>

    </form>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
